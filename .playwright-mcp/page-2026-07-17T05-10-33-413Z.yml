    - heading "8.2 操作步骤：从注册到第一条视频" [level=3] [ref=f2e366]
    - list [ref=f2e367]:
      - listitem [ref=f2e368]:
        - strong [ref=f2e369]: 注册平台账号（第1天）
        - text: 选择一个主攻平台（建议抖音/B站/YouTube三选一），用手机号或邮箱注册。注册后立即进行实名认证，否则后续无法开通变现功能。 ⚡ 提示：建议同时注册辅助平台账号，为后续多平台分发做准备。
      - listitem [ref=f2e370]:
        - strong [ref=f2e371]: 完善创作者资料（第1天）
        - text: 上传头像（清晰的人像或品牌Logo）、填写昵称（好记且有辨识度）、撰写简介（说明你是做什么的、能给观众什么价值）。B站/抖音的简介建议包含关键词以利于搜索。 📌 注意：昵称一旦确定不建议频繁修改，会影响粉丝搜索。
      - listitem [ref=f2e372]:
        - strong [ref=f2e373]: 选定细分赛道（第1-3天）
        - text: 根据你的技能、兴趣和市场需求选择赛道。热门赛道排行：美食(22%)、数码科技(15%)、教育(13%)、美妆(11%)、游戏(10%)、生活记录(9%)、财经(5%)。建议使用"交叉定位法"——将两个领域结合，如"财经+动漫"或"科技+美食"。 📌 注意：确定后前3个月不要轻易更换赛道。
      - listitem [ref=f2e374]:
        - strong [ref=f2e375]: 研究对标账号（第3-7天）
        - text: 找到你赛道中粉丝数在1万-10万之间的账号（太头部无法复制，太小没有参考价值）。分析他们的：选题类型、视频时长、更新频率、封面风格、开头钩子(hook)。用表格记录至少10个对标账号的关键数据。 ⚡ 提示：关注那些近3个月粉丝增长最快的账号，他们的内容策略最具参考性。
      - listitem [ref=f2e376]:
        - strong [ref=f2e377]: 准备基础设备（第3-7天）
        - text: 初期设备投入不必过高，以下是一个合理的预算分配：
