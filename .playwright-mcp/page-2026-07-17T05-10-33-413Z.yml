  - main [ref=f2e82]:
    - heading "1.1 自媒体博主（图文/短视频/直播）" [level=1] [ref=f2e83]
    - generic [ref=f2e84]: 这是创作者经济中规模最大、参与人数最多的行当。全球超过60%的创作者收入来自自媒体领域。
    - heading "一、核心赚钱手段" [level=2] [ref=f2e85]
    - generic [ref=f2e86]:
      - heading "1. 广告分成" [level=3] [ref=f2e87]
      - paragraph [ref=f2e88]: 平台在内容中插入广告，按播放量/点击量/展示量与创作者分成。这是自媒体博主最基础的变现方式。
      - list [ref=f2e89]:
        - listitem [ref=f2e90]:
          - strong [ref=f2e91]: YouTube Partner Program
          - text: — RPM $3-15（欧美），科技/金融类最高 $20+/千次
        - listitem [ref=f2e92]:
          - strong [ref=f2e93]: B站创作激励
          - text: — ¥2-8/千次播放，优质内容可达 ¥15
        - listitem [ref=f2e94]:
          - strong [ref=f2e95]: 抖音中视频计划
          - text: — ¥1-5/千次播放，依赖完播率和互动
        - listitem [ref=f2e96]:
          - strong [ref=f2e97]: 今日头条/公众号
          - text: — 单篇10万+阅读可赚 ¥1000-5000
    - generic [ref=f2e98]:
      - heading "2. 品牌商单/赞助" [level=3] [ref=f2e99]
      - paragraph [ref=f2e100]: 品牌方付费在创作者内容中植入产品/服务。这是自媒体博主收入最高的单一渠道之一。
      - list [ref=f2e101]:
        - listitem [ref=f2e102]:
          - strong [ref=f2e103]: 抖音达人报价
          - text: — 万粉 ≈ ¥1000-5000/条，头部博主单条 10-500万
        - listitem [ref=f2e104]:
          - strong [ref=f2e105]: 小红书种草
          - text: — 千粉 ≈ ¥50-200/篇，头部博主单篇 5-50万
        - listitem [ref=f2e106]:
          - strong [ref=f2e107]: YouTube 赞助植入
          - text: — 10万订阅 ≈ $1000-5000/条
        - listitem [ref=f2e108]:
          - strong [ref=f2e109]: 中介平台
          - text: — 巨量星图(抖音)、花火(小红书)、CreatorIQ、AspireIQ
    - generic [ref=f2e110]:
      - heading "3. 直播带货" [level=3] [ref=f2e111]
      - paragraph [ref=f2e112]: 通过直播形式展示商品并引导粉丝下单，获取销售佣金或自营利润。近年来增长最快的变现方式。
      - list [ref=f2e113]:
        - listitem [ref=f2e114]:
          - strong [ref=f2e115]: 佣金比例
          - text: — 淘宝联盟 5-50%、抖音精选联盟 5-40%
        - listitem [ref=f2e116]:
          - strong [ref=f2e117]: 头部主播
          - text: — 单场 GMV 过亿，年佣金收入千万-亿级
        - listitem [ref=f2e118]:
          - strong [ref=f2e119]: 关键成功因素
          - text: — 选品能力、供应链、粉丝信任、转化率
    - generic [ref=f2e120]:
      - heading "4. 打赏与付费订阅" [level=3] [ref=f2e121]
      - paragraph [ref=f2e122]: 观众赠送虚拟礼物兑换现金，或粉丝按月付费获取独家内容/社区权限。
      - list [ref=f2e123]:
        - listitem [ref=f2e124]:
          - strong [ref=f2e125]: 抖音直播
          - text: — 50/50分成，礼物价值 ¥0.1-数千
        - listitem [ref=f2e126]:
          - strong [ref=f2e127]: YouTube Super Chat
          - text: — 30%平台抽成
        - listitem [ref=f2e128]:
          - strong [ref=f2e129]: B站充电/大航海
          - text: — 50/50分成，舰长 ¥30/月
