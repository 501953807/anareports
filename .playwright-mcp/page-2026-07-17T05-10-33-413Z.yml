              - cell "¥400-700的\"推荐配\"是创作者经济的\"最优投入区间\"——超过此阈值的设备投资，ROI急剧下降" [ref=f2e416]
        - text: ⚡ 建议：新手用"推荐配"即可，设备不影响内容质量的决定性因素。
      - listitem [ref=f2e417]:
        - strong [ref=f2e418]: 写第一个脚本（第7-10天）
        - text: 脚本结构建议：黄金3秒开头（提问/冲突/悬念）→ 主体内容（3-5个要点）→ 结尾CTA（关注/评论/点赞）。字数控制：30秒视频约100字，1分钟约200字，5分钟约1200字。用AI工具（ChatGPT/Kimi）辅助生成脚本框架，然后人工润色。 📌 提示：先写标题和开头前3句话，如果这两部分不够吸引人，重写。
      - listitem [ref=f2e419]:
        - strong [ref=f2e420]: 拍摄素材（第10-14天）
        - text: 批量拍摄：一次性拍3-5条视频的素材以提高效率。注意光线方向（正面打光最安全）、收音质量（安静的环境比贵麦克风更重要）、画面稳定（三脚架胜过手持）。每条视频保留B-roll（空镜/特写）用于剪辑时覆盖跳切。
      - listitem [ref=f2e421]:
        - strong [ref=f2e422]: 剪辑成片（第14-21天）
        - text: 剪辑节奏建议：每3-5秒切换镜头或加入特效，保持观众注意力。使用剪映专业版（新手首选）或DaVinci Resolve（进阶）进行剪辑。关键步骤：粗剪去冗余 → 精剪调节奏 → 加字幕 → 调色 → 加BGM → 导出。导出参数：1080p/60fps/比特率15-20Mbps。 ⚡ 提示：第一条视频不要追求完美，完成比完美重要100倍。
      - listitem [ref=f2e423]:
        - strong [ref=f2e424]: 发布与优化（第21天）
        - text: 发布时间建议：工作日12:00-13:00或18:00-20:00，周末10:00-11:00。填写标题（含关键词）、标签（3-5个精准标签）、封面（高对比度+大字）、简介。发布后1小时内积极回复评论以助推算法推荐。同步分发到其他平台时注意去除水印和调整尺寸比例。
      - listitem [ref=f2e425]:
        - strong [ref=f2e426]: 数据分析与复盘（发布后7天）
        - text: 关注以下核心指标：播放量、完播率（决定推荐量的最关键指标）、互动率（点赞/播放、评论/播放、转发/播放）、粉丝转化率。完播率低→开头不够吸引人；互动率低→内容缺乏共鸣点；涨粉慢→人设不清晰或个人魅力不足。根据数据调整下一条视频的策略。
