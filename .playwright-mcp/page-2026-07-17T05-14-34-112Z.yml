        - list [ref=f3e172]:
          - listitem [ref=f3e173]:
            - strong [ref=f3e174]: 高速扩张期（2015-2017）：
            - text: 年均增速超过9%，主要得益于基础设施投资爆发式增长和电子信息产业的快速崛起。
          - listitem [ref=f3e175]:
            - strong [ref=f3e176]: 换挡调整期（2018-2022）：
            - text: 增速回落至3-6%区间，供给侧结构性改革和环保政策收紧带来阵痛，疫情进一步拖累增长。
          - listitem [ref=f3e177]:
            - strong [ref=f3e178]: 企稳回升期（2023-2024）：
            - text: 增速恢复至5-6%，新能源汽车等新兴产业成为新增长点。
      - generic [ref=f3e182]:
        - heading "三、深入理解" [level=2] [ref=f3e183]
        - heading "全国排名第10位的意义" [level=3] [ref=f3e184]
        - paragraph [ref=f3e185]: 重庆在全国省级行政区中排名第10位，位于湖北之后、天津之前。这个排名的背后有几个关键因素：
        - generic [ref=f3e186]:
          - generic [ref=f3e187]:
            - generic [ref=f3e188]: 
            - text: 行政区划的特殊性
          - generic [ref=f3e189]: 重庆的GDP总量中包含大量农村地区（面积8.24万平方公里，其中农村占70%以上）。如果仅计算主城都市区（约2.87万平方公里），其经济密度将大幅提升。因此，单纯用总量排名来衡量重庆的经济实力有一定局限性。
        - generic [ref=f3e190]:
          - generic [ref=f3e191]:
            - generic [ref=f3e192]: 
            - text: 增速换挡的必然性
          - generic [ref=f3e193]: 作为后发地区，重庆在基础设施大规模建设和产业转移承接阶段具有"追赶效应"，增速可以显著高于全国平均。但随着经济体量增大和基数提高，增速自然回落至潜在增长率附近（约4-6%）。这是所有发展中经济体的共同规律。
        - heading "与全国平均增速的比较" [level=3] [ref=f3e194]
