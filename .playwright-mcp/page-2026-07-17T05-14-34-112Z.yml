        - text: 第二部分 经济规模与产业地位
        - heading "六、GDP 总量与增速全国排名" [level=1] [ref=f3e93]
        - paragraph [ref=f3e94]: 2024年重庆GDP总量约3.01万亿元，在全国省级行政区中排名第10位。过去十年经历了从高速增长到增速换挡的完整周期。本章梳理重庆GDP的演变轨迹、全国排名变化及其背后的产业结构逻辑。
      - generic [ref=f3e95]:
        - heading "一、从一则真实故事说起" [level=2] [ref=f3e96]
        - paragraph [ref=f3e97]: 2010年，赵建国从广东深圳回到重庆，在渝北区开了一家电子配件加工厂。当时重庆GDP刚突破5000亿元，在全国排名约第20位。赵建国选择回渝创业，看中的是重庆低廉的土地和劳动力成本，以及西部大开发的税收优惠政策。到2019年，他的工厂年产值达到2亿元，雇佣了300多名员工——这正是重庆制造业黄金十年的缩影。然而2020年后，随着疫情冲击、中美贸易摩擦加剧和全球产业链重构，赵建国的订单量大幅波动，他深刻感受到了经济增长换挡期的阵痛。
