        - generic [ref=f7e90]: 第一部分 八卦
        - heading "一、八卦起源与演变概述" [level=1] [ref=f7e91]
        - paragraph [ref=f7e92]: 八卦符号系统的起源、构成原理及其在中国古典学术中的核心地位
      - heading "一、从一则历史故事说起" [level=2] [ref=f7e93]
      - paragraph [ref=f7e94]: 公元前11世纪，商朝最后一位君主纣王在羑里囚禁了西伯侯姬昌。七年的幽禁之中，姬昌没有愤懑消沉，而是将毕生所学倾注于对古老八卦的推演之中。当他重出羑里时，八卦已从八个简单的自然象征，扩展为一个描述万事万物变化规律的宏大系统——六十四卦。这个故事虽然讲述的是文王的功绩，但它引出了八卦这个符号系统的根本问题：它从何而来？又是如何演变的？
      - generic [ref=f7e95]:
        - heading "二、核心概念详解" [level=2] [ref=f7e96]
        - heading "二、核心概念详解" [level=2] [ref=f7e97]
        - paragraph [ref=f7e98]: 八卦的基础单元是"爻"。"爻"者，交也，表示阴阳之交感。阳爻象征刚健、主动、光明、上升的力量；阴爻象征柔顺、被动、幽暗、下降的力量。八卦中每一卦由三条爻自下而上叠加而成，因此八卦本质上是用阴阳二爻的三种排列组合来表达八种不同的状态。
        - paragraph [ref=f7e99]: 八卦的符号表示如下（从下到上依次为初爻、二爻、三爻）：
