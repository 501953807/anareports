          - generic [ref=f7e213]: 图1-1 先天八卦方位图：上南下北、左东右西。乾☰居南、坤☷居北、离☲居东、坎☵居西。
        - paragraph [ref=f7e214]:
          - strong [ref=f7e215]: 后天八卦
          - text: 强调变化和流动，描述的是阴阳之气在时空中的运行规律。其排列为：离南、坎北、震东、兑西、巽东南、乾西北、坤西南、艮东北。后天八卦的核心思想是"流行"——即万物在时间和空间中的生长化收藏。春天雷动（震），夏天火盛（离），秋天金旺（兑），冬天水寒（坎），这是四季的流转；东北为岁终岁始之交（艮），西南为万物成熟之地（坤），西北为天门（乾），东南为地道（巽），这是方位的流转。
