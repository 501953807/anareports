        - paragraph [ref=f7e183]: 这个表格展示了八卦最基本的属性映射。值得注意的是，八卦的每一重属性都不是孤立存在的——它们通过五行、方位、季节、颜色、声音等维度形成一个相互关联的网络。理解这个网络，是进入中国古典思维的关键。
        - heading "先天八卦与后天八卦" [level=3] [ref=f7e184]
        - paragraph [ref=f7e185]: 八卦有两种经典的排列方式：先天八卦（又称伏羲八卦）和后天八卦（又称文王八卦）。它们的排列顺序不同，所代表的哲学含义也不同。
        - paragraph [ref=f7e186]:
          - strong [ref=f7e187]: 先天八卦
          - text: 强调阴阳的对立统一和宇宙的原始状态。其排列为：乾南、坤北、离东、坎西、兑东南、艮西北、震东北、巽西南。先天八卦的核心思想是"对待"——即每一种力量都有其对立面，二者共同构成一个完整的系统。天与地对峙，火与水相望，山与泽呼应，雷与风相随。这种对称性反映了宇宙的基本秩序。
