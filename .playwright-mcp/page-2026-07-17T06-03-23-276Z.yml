    - heading "洗钱规模增长的核心驱动力" [level=2] [ref=f13e182]
    - generic [ref=f13e183]:
      - generic [ref=f13e184]:
        - heading " 全球化深化" [level=3] [ref=f13e185]:
          - generic [ref=f13e186]: 
          - text: 全球化深化
        - paragraph [ref=f13e187]: 跨境资本流动规模爆炸式增长，SWIFT年处理金额超$400万亿。资金跨境转移的速度和复杂度远超执法机构的监管能力。
      - generic [ref=f13e188]:
        - heading " 加密资产兴起" [level=3] [ref=f13e189]:
          - generic [ref=f13e190]: 
          - text: 加密资产兴起
        - paragraph [ref=f13e191]: 2024年链上加密资产交易量超$10万亿，其中约15%涉嫌与非法活动有关。去中心化金融(DeFi)创造了全新的洗钱通道。
      - generic [ref=f13e192]:
        - heading " AI技术赋能" [level=3] [ref=f13e193]:
          - generic [ref=f13e194]: 
          - text: AI技术赋能
        - paragraph [ref=f13e195]: AI洗钱案件2024-2025年增长340%。AI可自动生成伪造身份、编写漏洞利用代码、自动化混币路径选择，大幅提升洗钱效率和隐蔽性。
      - generic [ref=f13e196]:
        - heading " 电信诈骗产业化" [level=3] [ref=f13e197]:
          - generic [ref=f13e198]: 
          - text: 电信诈骗产业化
        - paragraph [ref=f13e199]: 东南亚杀猪盘/电诈产业年产值估计超$1000亿，产生海量需要洗钱的诈骗资金。涉及100-500个中间账户/钱包的复杂链路。
