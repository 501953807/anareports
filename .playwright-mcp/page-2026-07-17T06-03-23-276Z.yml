    - generic [ref=f13e239]: 2024年全球SWIFT跨境支付总额达$472万亿，其中约0.03%($141亿)被AML系统标记为可疑。东亚/东南亚区域洗钱规模$1,500-3,000亿，占全球约10%，但执法资源投入不足全球的8%——这种"风险-资源错配"是洗钱规模持续扩张的制度性根源。
    - heading "五大学派交叉分析：全球洗钱规模扩张的结构性动因" [level=2] [ref=f13e240]
    - generic [ref=f13e241]:
      - strong [ref=f13e242]: 公共选择理论：
      - text: 各国对洗钱的"容忍度"并非偶然，而是政治经济均衡的结果。美国需要离岸金融中心维持美元霸权，欧洲需要私人银行服务吸引全球财富，中国需要地下钱庄的替代通道支持粤港澳大湾区资本流动——每个司法管辖区都在"反洗钱承诺"和"资本自由流动利益"之间做权衡。FATF标准看似统一，实际执行中的选择性问题暴露了监管的政治经济学本质。
    - generic [ref=f13e243]:
      - strong [ref=f13e244]: 马克思主义政治经济学(资本流动)：
      - text: 洗钱是全球资本积累的"暗面循环"。当剩余价值通过欺诈、毒品、腐败在边缘国家产生时，必须经过洗钱进入中心国家的金融体系实现再生产。东亚→北美/欧洲的洗钱流向，与马克思描述的"中心-外围"资本流动完全同构。加密技术不是创造了新洗钱，而是降低了边缘资本进入中心金融体系的交易成本。
    - generic [ref=f13e245]:
      - strong [ref=f13e246]: 后凯恩斯主义(Minsky)：
      - text: 洗钱规模从$11.2万亿(2015中值)增长到$21万亿(2026中值)，增速90%超过同期GDP增速43%——这是一个典型的"金融-犯罪复合体"扩张周期。Minsky框架下，当合规成本低于违规预期罚款时，机构选择"对冲融资"式合规；当罚款飙升时转入"投机融资"——只够付罚款不够修复系统；最终在下一轮丑闻爆发时陷入"庞氏融资"——合规成本吞噬利润但仍无法阻止漏洞。
    - generic [ref=f13e247]:
      - strong [ref=f13e248]: 新制度经济学：
      - text: 各区域洗钱规模差异本质上是制度质量的函数。东亚/东南亚高洗钱规模($1,500-3,000亿)对应低BO透明度+弱FIU协作+高腐败感知指数；北美中等规模($1,000-2,000亿)对应高透明度但高资本流动复杂度。制度质量改善的边际收益递减——从灰名单到脱灰比从脱灰到满分容易10倍，这解释了为什么UAE进步快但瑞士仍有漏洞。
    - generic [ref=f13e249]:
      - strong [ref=f13e250]: 演化经济学：
      - text: 洗钱渠道不是静态分类，而是动态竞争生态。地下钱庄→TBML→空壳公司→混币器→稳定币→AI洗钱，这是一条清晰的"技术迭代链"。每一代渠道都比前一代具有更低的交易成本、更高的并行度和更强的抗追踪能力。关键转折点是2022年OFAC制裁Tornado Cash——这一"选择压力"催生了Blend等AI混币器的变异体，演化速度从5年一代加速到1-2年一代。
    - generic [ref=f13e251]:
      - generic [ref=f13e252]:
        - generic [ref=f13e253]: 
        - text: 案例：东南亚"对敲帝国"——中缅泰老边境的平行金融系统
      - generic [ref=f13e254]:
        - paragraph [ref=f13e255]:
          - strong [ref=f13e256]: 规模：
          - text: 缅甸/柬埔寨/老挝边境地下钱庄网络年处理金额超$200亿
        - paragraph [ref=f13e257]:
          - strong [ref=f13e258]: 结构：
          - text: 中国境内"水房"控制1200+张银行卡→ 通过Telegram通知金三角境外节点 → 境外用诈骗所得USD/THB直接放款给目标客户 → 差额通过边境贸易预付款平衡
        - paragraph [ref=f13e259]:
          - strong [ref=f13e260]: 关键创新：
