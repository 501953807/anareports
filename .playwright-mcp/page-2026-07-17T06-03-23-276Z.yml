    - heading "1.1 全球洗钱规模与历史趋势" [level=1] [ref=f13e63]
    - generic [ref=f13e64]: 根据国际货币基金组织(IMF)和FATF估计，全球洗钱规模每年在$8万亿-$20万亿美元之间，相当于全球GDP的2%-5%。这一估算涵盖所有形式的洗钱活动，包括毒品犯罪、腐败、欺诈、税务犯罪等有罪收益的清洗。
    - heading "洗钱规模的估算方法论" [level=2] [ref=f13e65]
    - paragraph [ref=f13e66]: 洗钱规模的估算极其困难，因为洗钱本身就是非法的、隐蔽的活动。主要方法包括：
