    - heading "合规实务：金融机构洗钱风险自评估(SRA)操作手册" [level=2] [ref=f13e282]
    - generic [ref=f13e283]:
      - generic [ref=f13e284]:
        - generic [ref=f13e285]: 
        - text: FATF建议第1条：风险评估要求
      - paragraph [ref=f13e287]: FATF建议第1条要求所有受监管实体进行书面化的洗钱/恐怖融资风险评估(Risk Assessment)。以下是自评估操作指南。
    - list [ref=f13e288]:
      - listitem [ref=f13e289]:
        - strong [ref=f13e290]: 界定评估范围：
        - text: 明确覆盖的业务范围(零售银行/企业银行/贸易金融/私人银行/加密业务)、地理范围(本国/跨境/高风险司法管辖区)、客户类型(自然人/法人/信托/FOA)。
      - listitem [ref=f13e291]:
        - strong [ref=f13e292]: 识别固有风险(RI)：
        - text: 对每个业务单元评估四大风险因子：(a)客户风险——PEP/现金密集行业/VASP/无面对面KYC客户分别赋分3-5分；(b)产品/服务风险——代理行业务/私人银行/跨境汇款分别赋分3-5分；(c)渠道风险——非面对面开户/代理行分别赋分3-5分；(d)地域风险——FATF灰名单国家赋分5分，高风险司法管辖区赋分4分。
      - listitem [ref=f13e293]:
        - strong [ref=f13e294]: 评估现有 controls有效性：
        - text: 逐项评估现有AML控制措施：KYC流程成熟度(0-3分)、Transaction Monitoring规则覆盖率(规则数/行业建议规则数×3)、SAR/STR提交质量(FIU反馈评分)、Staff Training覆盖率(%)。controls越弱→调整后风险(After-Risk)越高。
      - listitem [ref=f13e295]:
        - strong [ref=f13e296]: 计算剩余风险(RR)：
        - text: RR = RI × (1 - Controls_Effectiveness)。若RR > Risk_Appetite_Threshold → 必须制定 remediation plan并在下次董事会汇报。
      - listitem [ref=f13e297]:
        - strong [ref=f13e298]: 编写SRA报告并报送治理层：
        - text: 报告需包含：方法论说明、数据源(内部交易数据/行业基准/执法案例)、风险热力图、差距分析(gap analysis)、remediation计划(责任人+截止日期)。
