    - generic [ref=f8e72]: 数据信号：传统洗钱信号增长平稳(2020年5万起→2026年65千起)，加密相关信号呈指数增长(2020年5千起→2026年20万起)，AI新型信号从零起步但增速最快(2026年达6万起)。关键趋势：2024年后加密信号首次超过传统信号，标志着洗钱检测进入"数字化时代"。
    - heading "五学派交叉分析：风险信号的经济学本质" [level=3] [ref=f8e73]
    - generic [ref=f8e74]:
      - strong [ref=f8e75]: Monetarism(货币主义)：
      - text: 风险信号本质上是"货币异常流动的信号"——当资金流动偏离正常MV=PQ关系时产生告警。结构化交易(Smurfing)是典型的货币流通速度异常：资金以刻意规避监控的方式流动，改变了M2的表观增长速度。
    - generic [ref=f8e76]:
      - strong [ref=f8e77]: Supply-side Economics(供给侧经济学)：
      - text: 风险检测系统的供给质量决定了对洗钱的识别率。规则引擎(供给侧工具)的升级——从静态阈值到AI动态模型——提高了检测供给的质量。供给侧视角：降低误报率(FPR)比提高检测率(TPR)更经济，因为每条误报都消耗分析师时间。
    - generic [ref=f8e78]:
      - strong [ref=f8e79]: Behavioral Economics(行为经济学)：
      - text: 洗钱者使用"刚好低于阈值"的策略(如$9,999而非$10,001)利用了规则的"框架效应"。AI对抗性交易模式更是直接针对检测系统的认知偏差。行为学派指出：检测系统本身也需要"行为设计"——考虑人类分析师的认知负荷和疲劳效应。
    - generic [ref=f8e80]:
      - strong [ref=f8e81]: Ecological Economics(生态经济学)：
      - text: 风险信号构成一个"信息生态系统"——传统信号、加密信号和AI信号分别代表不同层级的生态位。随着加密信号的增长，整个系统的生态平衡被打破，需要新的检测物种(AI模型)来填补生态位空缺。
    - generic [ref=f8e82]:
      - strong [ref=f8e83]: World Economic Cycle Theory(世界经济周期理论)：
      - text: 风险信号的演化与康波周期同步。2020-2021上升期：传统信号主导；2022-2023下行期：加密信号爆发；2024-2025转型期：AI信号崛起。下一轮技术革命将催生"量子信号"——基于量子计算的异常检测可能完全改变信号生态。
    - generic [ref=f8e84]:
