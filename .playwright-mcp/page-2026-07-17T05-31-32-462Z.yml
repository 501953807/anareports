    - generic [ref=f8e92]:
      - strong [ref=f8e93]: 分化链：风险信号检测的博弈演化
      - text: 起点 → 传统规则引擎(阈值+黑白名单) → 加密交易量增长10倍 → 分化A：误报率飙升至95% → 分析师疲劳 → 漏报增加分化B：引入AI/GNN检测 → TPR提升3倍 → 终态B：但AI洗钱工具出现 → 新一轮猫鼠游戏分化C：Deepfake KYC绕过率10-15% → 终态C：多模态活体检测成为新标准 → KYC成本翻倍
    - generic [ref=f8e94]:
      - generic [ref=f8e95]:
        - generic [ref=f8e96]: 
        - text: 将风险信号转化为可执行的监控规则
      - paragraph [ref=f8e98]: 以下是将红旗信号转化为交易监测规则引擎具体规则的实操方法，适用于SQL/DataBricks/Flink环境。
    - list [ref=f8e99]:
      - listitem [ref=f8e100]:
        - strong [ref=f8e101]: 规则1——结构化交易检测(Smurfing)：
        - text: SELECT customer_id, DATE_TRUNC('day', transaction_date) AS txn_day, COUNT(DISTINCT CASE WHEN amount BETWEEN threshold_min AND threshold_max THEN transaction_id END) AS near_threshold_txns FROM transactions GROUP BY customer_id, txn_day HAVING near_threshold_txns >= 5 AND near_threshold_txns / COUNT(*) >= 0.3。解释：客户单日≥30%的交易金额落在阈值附近(如美国$8,000-$9,999或中国¥40,000-¥49,999)。
      - listitem [ref=f8e102]:
        - strong [ref=f8e103]: 规则2——快进快出(水房归集)：
        - text: SELECT account_id, SUM(incoming_amount) as total_in, AVG(TIMESTAMPDIFF(SECOND, first_in_time, first_out_time)) AS avg_balance_hours FROM (SELECT * FROM daily_balances WHERE balance_at_eod <= daily_inflow * 0.05) WHERE avg_balance_hours <= 24。解释：账户日均留存时间≤24h且当日结束时余额≤当日流入的5%。
      - listitem [ref=f8e104]:
        - strong [ref=f8e105]: 规则3——夜间异常活跃：
        - text: SELECT customer_id, COUNT(*) AS night_txns FROM transactions WHERE HOUR(transaction_time) BETWEEN 23 AND 5 GROUP BY customer_id HAVING night_txns / total_txns >= 0.4。解释：夜间(23:00-05:00)交易占比≥40%的客户标记异常。
      - listitem [ref=f8e106]:
        - strong [ref=f8e107]: 规则4——多对一资金归集：
        - text: SELECT recipient_account, COUNT(DISTINCT sender_account) AS unique_senders, SUM(amount) AS total FROM transactions WHERE transaction_date BETWEEN DATE_SUB(NOW(), INTERVAL 7 DAY) GROUP BY recipient_account HAVING unique_senders >= 10 AND total > base_income * 5。解释：7天内≥10个不同付款人向同一账户转账且总额超客户基准收入5倍以上。
      - listitem [ref=f8e108]:
        - strong [ref=f8e109]: 规则5——加密地址风险接触：
        - text: SELECT wallet_address, chain, risk_score FROM chainalysis_risk_api WHERE risk_score >= 50 AND last_seen_days_ago <= 30。解释：最近30天内与风险评分≥50的链上地址发生过交易的钱包地址。
