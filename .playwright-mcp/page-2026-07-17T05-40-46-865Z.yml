    - heading "内容选题方法论" [level=1] [ref=f10e693]
    - generic [ref=f10e694]:
      - generic [ref=f10e695]:
        - generic [ref=f10e696]: 
        - text: 方法一：搜索法 — 让平台告诉你用户想看什么
      - generic [ref=f10e697]:
        - paragraph [ref=f10e698]:
          - strong [ref=f10e699]: 操作
          - text: ：在目标平台的搜索框输入你的赛道关键词，看自动补全的下拉推荐词。这些就是当前平台用户主动搜索的高频需求。
        - paragraph [ref=f10e700]:
          - strong [ref=f10e701]: 示例
          - text: ：在小红书搜索"学Python"，看到下拉推荐："学Python零基础""学Python需要数学基础吗""学Python后能做什么工作"。这三个就是现成的选题。
        - paragraph [ref=f10e702]:
          - strong [ref=f10e703]: 技巧
          - text: ：每天花5分钟做这个搜索，建立一个「需求词库」，每周至少产出2条来自词库的内容。
    - generic [ref=f10e704]:
      - generic [ref=f10e705]:
        - generic [ref=f10e706]: 
        - text: 方法二：热点法 — 借势平台流量的放大器
      - generic [ref=f10e707]:
        - paragraph [ref=f10e708]:
          - strong [ref=f10e709]: 操作
          - text: ：使用新榜（国内）、Google Trends（海外）、蝉妈妈（抖音）、TikTok Creative Center 发现当前热点话题，然后思考你的赛道如何与热点关联。
        - paragraph [ref=f10e710]:
          - strong [ref=f10e711]: 示例
          - text: ：AI技术热点爆发时，做一个赛道的AI相关解读内容，比纯赛道内容获得更大的流量池。
        - paragraph [ref=f10e712]:
          - strong [ref=f10e713]: 注意
          - text: ：热点窗口期通常只有2-3天，要快。但不要为了蹭热点而蹭热点，必须与你的赛道有关联性。
    - generic [ref=f10e714]:
      - generic [ref=f10e715]:
        - generic [ref=f10e716]: 
        - text: 方法三：对标法 — 复制成功，加上你的差异化
      - generic [ref=f10e717]:
        - paragraph [ref=f10e718]:
          - strong [ref=f10e719]: 操作
          - text: ：找到你的对标账号中最近一条爆款（播放/点赞是平时3倍以上），拆解它的标题、结构、切入点，用同样的形式+你的视角/数据/故事重做一次。
        - paragraph [ref=f10e720]:
          - strong [ref=f10e721]: 示例
          - text: ：对标博主做了一条"AI工具Top10"爆了，你也可以做"打工人必备的10个免费AI工具"——同样的选题框架，但不同的切入角度和目标人群。
        - paragraph [ref=f10e722]:
          - strong [ref=f10e723]: 底线
          - text: ：不要抄袭原文，而是借用经过验证的选题框架。这是「方法论的复用」，不是「内容的抄袭」。
    - generic [ref=f10e724]:
      - generic [ref=f10e725]:
        - generic [ref=f10e726]: 
        - text: 方法四：常青法 — 做永远有人搜的内容
      - generic [ref=f10e727]:
        - paragraph [ref=f10e728]:
          - strong [ref=f10e729]: 操作
          - text: ：制作"evergreen"内容类型：教程类（How-to）、评测类（Review）、清单类（Top X）、对比类（A vs B）、FAQ类。
        - paragraph [ref=f10e730]:
          - strong [ref=f10e731]: 优势
          - text: ：这类内容不会过时，发布时间越长，通过搜索带来的长尾流量越多。一条好的YouTube教程可以在发布3年后仍然每天都有播放量。
        - paragraph [ref=f10e732]:
          - strong [ref=f10e733]: 比例建议
          - text: ：新手的内容组合 = 60%常青内容（打底）+ 30%热点借势（拉新）+ 10%个人观点/日常（建立人格连接）。
    - heading "第一笔收入路径" [level=1] [ref=f10e734]
    - paragraph [ref=f10e735]: 以下是按「从最快到最慢」排列的收入路径，标注了从开始创作到拿到第一笔钱需要的时间。
    - generic [ref=f10e736]:
      - generic [ref=f10e737]:
        - generic [ref=f10e738]:
          - generic [ref=f10e739]: 
          - text: 路径一：打赏/充电（最快1天）
        - generic [ref=f10e740]:
          - paragraph [ref=f10e741]:
            - strong [ref=f10e742]: 速度
            - text: ：⭐⭐⭐⭐⭐ 最快1天内收到第一笔
          - paragraph [ref=f10e743]:
            - strong [ref=f10e744]: 门槛
            - text: ：几乎为零，平台开启赞赏功能即可
          - paragraph [ref=f10e745]:
            - strong [ref=f10e746]: 方式
            - text: ：抖音直播打赏 / B站充电 / YouTube超级感谢 / 小红书赞赏 / 知识星球付费圈子
          - paragraph [ref=f10e747]:
            - strong [ref=f10e748]: 预期
            - text: ：月均¥50-500（早期）
          - paragraph [ref=f10e749]:
            - strong [ref=f10e750]: 建议
            - text: ：这是建立「用户愿意为你内容付费」信心的最快路径
      - generic [ref=f10e751]:
        - generic [ref=f10e752]:
          - generic [ref=f10e753]: 
          - text: 路径二：平台广告分成（1-3个月）
        - generic [ref=f10e754]:
          - paragraph [ref=f10e755]:
            - strong [ref=f10e756]: 速度
            - text: ：⭐⭐⭐⭐ 达标后即可开启
          - paragraph [ref=f10e757]:
            - strong [ref=f10e758]: 门槛
            - text: ：YouTube 4000小时观看+1K粉 / B站10万粉创作激励 / 抖音中视频计划
          - paragraph [ref=f10e759]:
            - strong [ref=f10e760]: 方式
            - text: ：视频前贴片广告 / 信息流广告 / 创作激励计划
          - paragraph [ref=f10e761]:
            - strong [ref=f10e762]: 预期
            - text: ：千次播放¥2-¥50（各平台差异巨大）
          - paragraph [ref=f10e763]:
            - strong [ref=f10e764]: 建议
            - text: ：YouTube的CPM最高（$3-10），其次是B站，抖音最低（约¥0.5-3/万播放）
      - generic [ref=f10e765]:
        - generic [ref=f10e766]:
          - generic [ref=f10e767]: 
          - text: 路径三：品牌商单（1-6个月）
        - generic [ref=f10e768]:
          - paragraph [ref=f10e769]:
            - strong [ref=f10e770]: 速度
            - text: ：⭐⭐⭐ 需要积累到一定粉丝基数
          - paragraph [ref=f10e771]:
            - strong [ref=f10e772]: 门槛
            - text: ：通常1000粉以上可接小单，1万粉以上接品牌单
          - paragraph [ref=f10e773]:
            - strong [ref=f10e774]: 方式
            - text: ：微博/抖音星图 / B站花火 / 小红书蒲公英 / YouTube brand deals / 私信直接联系
          - paragraph [ref=f10e775]:
            - strong [ref=f10e776]: 预期
            - text: ：1K粉报价¥500-2000 / 10K粉¥2000-10000 / 100K粉¥10000-50000
          - paragraph [ref=f10e777]:
            - strong [ref=f10e778]: 建议
            - text: ：粉丝少但精准（如科技评测）的报价不一定低于粉丝多但不精准的
      - generic [ref=f10e779]:
        - generic [ref=f10e780]:
          - generic [ref=f10e781]: 
          - text: 路径四：带货/联盟营销（1-3个月）
        - generic [ref=f10e782]:
          - paragraph [ref=f10e783]:
            - strong [ref=f10e784]: 速度
            - text: ：⭐⭐⭐⭐ 开通橱窗即可开始
          - paragraph [ref=f10e785]:
