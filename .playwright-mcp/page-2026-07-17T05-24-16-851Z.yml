    - heading "实操：如何进入智能穿戴市场 — 从市场调研到商业计划书" [level=2] [ref=f5e253]
    - generic [ref=f5e254]:
      - generic [ref=f5e255]: 入门提示
      - generic [ref=f5e256]: 智能手环+药盒捆绑模式的最低启动资金为80万(ODM公模)，相比自研硬件200-400万的门槛低60%。先验证商业模式，再逐步投入研发。
    - heading "第一步：建立市场数据库(耗时1周，成本0)" [level=3] [ref=f5e257]
    - list [ref=f5e258]:
      - listitem [ref=f5e259]:
        - strong [ref=f5e260]: 下载免费报告摘要：
        - text: 访问Grand View Research官网(grandviewresearch.com/industry-report/smart-wearable-devices-market)，注册下载12页摘要版获取2024年全球出货量、CR5品牌排名。Statista(statista.com)注册免费版可查中国手环市占率趋势图。StatCounter提供各品牌线上搜索热度月度趋势。
      - listitem [ref=f5e261]:
        - strong [ref=f5e262]: 购买深度报告：
        - text: 艾瑞咨询(iResearch.cn)购买《2025年中国智能穿戴市场研究报告》(价格约3,000元)，获取手环/手表/耳戴式穿戴细分市场、渠道分布(线上62%/线下38%)、消费者画像(25-45岁占73%)。
      - listitem [ref=f5e263]:
        - strong [ref=f5e264]: 爬虫数据采集：
        - text: 用Python+Selenium抓取京东搜索"老人GPS手表"前100名商品的价格、评分、评论数。目标：竞品SKU列表200个、价格分布直方图、差评词云。
      - listitem [ref=f5e265]:
        - strong [ref=f5e266]: 行业展会调研：
        - text: 参加2026年1月深圳国际消费电子展(CES Asia，深圳会展中心福田馆)和8月香港电子展(HK Electronics Fair)。现场收集10家方案商名片，拿样品机对比手感。
      - listitem [ref=f5e267]:
        - strong [ref=f5e268]: 终端走访：
        - text: 去10家线下门店(苏宁/国美/迪信通)拍货架照片，记录竞品陈列位置、导购话术、促销方式。重点观察华为体验店的手环体验流程。
    - heading "第二步：TAM/SAM/SOM计算(耗时2天)" [level=3] [ref=f5e269]
    - table [ref=f5e270]:
      - rowgroup [ref=f5e271]:
        - row [ref=f5e272]:
          - columnheader "指标" [ref=f5e273]
          - columnheader "计算公式" [ref=f5e274]
          - columnheader "本方案取值" [ref=f5e275]
      - rowgroup [ref=f5e276]:
        - row [ref=f5e277]:
          - cell "TAM(总可用市场)" [ref=f5e278]
          - cell "中国60岁以上人口 × 智能穿戴渗透率" [ref=f5e279]
          - cell "2.97亿 × 15% = 4,460万台/年" [ref=f5e280]
        - row [ref=f5e281]:
          - cell "SAM(可服务市场)" [ref=f5e282]
          - cell "TAM × 防走失+用药提醒功能需求比例" [ref=f5e283]
          - cell "4,460万 × 8% = 357万台/年" [ref=f5e284]
        - row [ref=f5e285]:
          - cell "SOM(可获得市场)" [ref=f5e286]
          - cell "SAM × 首年可夺取份额(假设0.3%)" [ref=f5e287]
          - cell "357万 × 0.3% = 1.07万台/年" [ref=f5e288]
        - row [ref=f5e289]:
          - cell "对应收入" [ref=f5e290]
          - cell "SOM × 客单价(手环+药盒套装699元)" [ref=f5e291]
          - cell "1.07万 × 699 = ~750万元" [ref=f5e292]
    - generic [ref=f5e293]:
      - generic [ref=f5e294]: 关键假设校验
      - generic [ref=f5e295]: 0.3%市场份额假设基于：首年营销预算50万、获客成本120元/台(百度SEM+CPC0.8元点击×转化率1.7%)、渠道覆盖3个一线城市。若获客成本降至60元(口碑裂变)，SOM可扩展至2.1万台。建议每季度重新校准SOM。
