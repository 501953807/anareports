    - list [ref=f5e408]:
      - listitem [ref=f5e409]:
        - strong [ref=f5e410]: 企查查/天眼查查询：
        - text: 搜索目标方案商的工商注册信息，查看实缴资本、参保人数(少于5人的公司大概率是皮包公司)、是否有行政处罚记录。
      - listitem [ref=f5e411]:
        - strong [ref=f5e412]: 专利检索：
        - text: 在国家知识产权局(cnipa.gov.cn)搜索该公司专利数量。手环方案商应至少有3件以上GPS/定位相关实用新型或发明专利。
      - listitem [ref=f5e413]:
        - strong [ref=f5e414]: 客户背书验证：
        - text: 让方案商提供2-3个已有客户联系方式，直接打电话询问合作体验、良品率、售后服务响应速度。这是最直接有效的背调方式。
      - listitem [ref=f5e415]:
        - strong [ref=f5e416]: 样品测试对比：
        - text: 每家方案商先拿一台公模样机(免费或¥200押金)，用相同测试流程跑一遍：GPS锁定速度、心率精度(用华为手表作参照)、BLE配对稳定性、续航表现。
