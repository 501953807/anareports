        - paragraph [ref=f1e174]: 数据来源：重庆市统计局年度统计公报、第七次全国人口普查
        - heading "城镇化率的跃升" [level=3] [ref=f1e175]
        - paragraph [ref=f1e176]: 重庆城镇化率从2015年的52.7%提升至2024年的71.3%，九年提升了18.6个百分点。这一增速在全国省级行政区中位居前列。但需要注意的是，重庆的城镇化存在明显的区域差异：主城都市区城镇化率超过75%，而渝东北三峡库区城镇群仅为48%，渝东南生态涵养区仅为45%。
      - generic [ref=f1e177]:
        - heading "三、深入理解" [level=2] [ref=f1e178]
        - heading "人口增长的三个阶段" [level=3] [ref=f1e179]
        - list [ref=f1e180]:
          - listitem [ref=f1e181]:
            - strong [ref=f1e182]: 快速扩张期（2015-2020）：
            - text: 常住人口年均增加约30万人，主要驱动力是成渝地区产业转移带来的务工人口流入，以及城镇化率的快速提升。
          - listitem [ref=f1e183]:
            - strong [ref=f1e184]: 增速放缓期（2021-2022）：
            - text: 年均增量降至个位数，新冠疫情导致跨省流动减少，部分外出务工人员选择就近就业。
          - listitem [ref=f1e185]:
            - strong [ref=f1e186]: 平台期（2023-2024）：
            - text: 人口总量基本停滞，自然增长率先负，机械增长也趋近于零。人口红利窗口正在关闭。
        - heading "自然增长的隐忧" [level=3] [ref=f1e190]
        - paragraph [ref=f1e191]: 2024年重庆出生率约为6.5‰，死亡率约为7.5‰，自然增长率为-1.0‰。这意味着即使不考虑人口流动，重庆的人口也在自然减少。与全国平均水平相比，重庆的老龄化程度更为严重——60岁以上人口占比已超过22%，高于全国平均约2个百分点。
        - paragraph [ref=f1e192]: 从生育率来看，重庆的总和生育率估计在1.0-1.2之间，远低于维持人口稳定所需的2.1。这一水平与日本、韩国相近，意味着未来10-15年重庆将面临更为严峻的人口收缩压力。
      - generic [ref=f1e193]:
        - heading "四、在现代生活中的应用" [level=2] [ref=f1e194]
        - paragraph [ref=f1e195]: 人口规模的变化直接影响重庆的产业布局和政策制定。以下从三个维度分析其对经济发展的实际影响：
        - generic [ref=f1e196]:
          - generic [ref=f1e197]:
            - generic [ref=f1e198]: 
            - text: 劳动力供给
          - generic [ref=f1e199]: 劳动年龄人口（15-59岁）占比从2015年的73%下降至2024年的68%。制造业和服务业面临用工成本上升压力，汽车、电子等支柱产业的人工成本年均上涨8-10%。
        - generic [ref=f1e200]:
          - generic [ref=f1e201]:
            - generic [ref=f1e202]: 
            - text: 消费市场
          - generic [ref=f1e203]: 常住人口增速放缓直接制约消费市场规模扩张。2024年重庆社会消费品零售总额同比增长仅3.2%，低于全国平均的4.4%。人口总量停滞意味着内需增长主要依赖消费升级而非人口增量。
        - generic [ref=f1e204]:
          - generic [ref=f1e205]:
            - generic [ref=f1e206]: 
            - text: 房地产市场
          - generic [ref=f1e207]: 人口增长乏力叠加住房存量充足，重庆商品房库存去化周期长达18个月，高于全国平均的14个月。主城九区之外的区县市场压力更大，部分区县房价已从峰值回落20-30%。
        - generic [ref=f1e208]:
          - generic [ref=f1e209]:
            - generic [ref=f1e210]: 
            - text: 案例：万州区的人口流失
          - paragraph [ref=f1e212]: 万州区作为渝东北地区的人口大区，常住人口从2015年的166万下降至2024年的148万，十年减少18万人。大量青壮年劳动力流向主城都市区和沿海城市，导致当地消费萎缩、学校合并、商业凋敝。这反映了重庆内部人口流动的"虹吸效应"——渝东北和渝东南的人口持续向主城集中。
