  - main [ref=f1e88]:
    - article [ref=f1e89]:
      - generic [ref=f1e90]:
        - text: 第一部分 人口与劳动力
        - heading "一、常住人口规模与变化趋势" [level=1] [ref=f1e91]
        - paragraph [ref=f1e92]: 2015-2025年重庆常住人口从2300万增长至3213万，城镇化率从53%提升至71%，但自然增长率持续走低甚至转负。本章梳理重庆人口规模演变轨迹与区域流动格局。
      - generic [ref=f1e93]:
        - heading "一、从一则历史故事说起" [level=2] [ref=f1e94]
        - paragraph [ref=f1e95]: 1997年6月18日，重庆正式成为直辖市。当时的重庆辖区面积只有6万平方公里，常住人口约3000万，GDP不足1000亿元。然而，重庆的行政区划有一个独特之处——它管辖着8.24万平方公里的土地和3200多万人口，相当于一个中等省份。从那时起，重庆经历了中国历史上规模最大的城市化进程之一。
        - paragraph [ref=f1e96]: 到2024年，重庆常住人口达到3213万人，在全国省级行政区中排名第 fifth（仅次于广东、山东、河南、江苏）。但更值得关注的是人口增长的结构性变化：2022年重庆自然增长率为-1.0‰，这是直辖以来首次出现人口负增长。在总量仍在上升的同时，内生动力已经减弱。
        - generic [ref=f1e97]:
          - generic [ref=f1e98]:
            - generic [ref=f1e99]: 
            - text: 关键认知
          - generic [ref=f1e100]: 重庆的人口增长模式已经从"自然增长+机械增长"双轮驱动，转变为几乎完全依赖外来人口流入的单轮驱动。这种模式的可持续性值得深入分析。
      - generic [ref=f1e101]:
        - heading "二、核心概念详解" [level=2] [ref=f1e102]
        - heading "常住人口的统计口径" [level=3] [ref=f1e103]
        - paragraph [ref=f1e104]: 常住人口是指实际经常居住在某地区一定时间（半年以上）的人口。它与户籍人口的关键区别在于：不以户口登记为依据，而以实际居住地为准。对于重庆这样一个拥有大量农民工外出务工和返乡创业的城市，常住人口指标比户籍人口更能反映真实的经济活力。
